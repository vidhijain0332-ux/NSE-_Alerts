name: NSE Announcements Bot

on:
  schedule:
    - cron: "0,30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore seen_ids cache
        uses: actions/cache@v4
        with:
          path: seen_ids.json
          key: seen-ids-${{ github.run_id }}
          restore-keys: |
            seen-ids-

      - name: Run NSE Announcements Bot
        env:
          TELEGRAM_BOT_TOKEN:          ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GOOGLE_SHEET_ID:             ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_JSON:     ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          TELEGRAM_CHANNEL_RESULTS:    ${{ secrets.TELEGRAM_CHANNEL_RESULTS }}
          TELEGRAM_CHANNEL_INVESTORS:  ${{ secrets.TELEGRAM_CHANNEL_INVESTORS }}
          TELEGRAM_CHANNEL_ACQ:        ${{ secrets.TELEGRAM_CHANNEL_ACQ }}
          TELEGRAM_CHANNEL_DEMERGER:   ${{ secrets.TELEGRAM_CHANNEL_DEMERGER }}
          TELEGRAM_CHANNEL_MANAGEMENT: ${{ secrets.TELEGRAM_CHANNEL_MANAGEMENT }}
          TELEGRAM_CHANNEL_OTHERS:     ${{ secrets.TELEGRAM_CHANNEL_OTHERS }}
        run: python nse_announcements.py

      - name: Save seen_ids back to repo
        run: |
          git config user.name "NSE Bot"
          git config user.email "nse-bot@users.noreply.github.com"
          git pull --rebase origin main
          git add seen_ids.json
          git diff --staged --quiet || git commit -m "chore: update seen_ids [skip ci]"
          git push origin main
